name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - run: bun run build
      - run: npm publish packages/compiler --access public --provenance
      - run: npm publish packages/parser --access public --provenance
      - run: npm publish packages/runtime --access public --provenance
      - run: npm publish packages/schema --access public --provenance
      - run: npm publish packages/server --access public --provenance
      - run: npm publish packages/studio --access public --provenance
